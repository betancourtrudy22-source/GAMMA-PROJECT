# SonarQube — Proyecto GAMMA
# Configuración para análisis estático de calidad del código

sonar.projectKey=proyecto-gamma
sonar.projectName=Proyecto GAMMA - Sistema de Expedientes Médicos
sonar.projectVersion=1.0.0

# Fuentes principales
sonar.sources=src,main.py
sonar.tests=tests

# Exclusiones del análisis
sonar.exclusions=**/__pycache__/**,**/*.pyc,scripts/**

# Cobertura de pruebas (generado por pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Umbrales de calidad (Quality Gate)
# Cobertura mínima: 85% (según documentación del proyecto)
# Duplicaciones máximas: 3%
# Deuda técnica máxima: 1h
